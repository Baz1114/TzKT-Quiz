<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #005377;
      border-radius: 16px;
      padding: 40px;
      width: 500px;
      max-width: 95vw;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      text-align: center;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
      color: #caa130;
    }

    .subtitle {
      color: #ffffff;
      margin-bottom: 32px;
      font-size: 0.9rem;
      opacity: 0.7;
    }

    #question-box {
      background: #146082;
      border-radius: 12px;
      padding: 24px;
      font-size: 1.1rem;
      line-height: 1.5;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      color: #ffffff;
    }

    #answer-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 2px solid #146082;
      background: #005377;
      color: #ffffff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }

    #answer-input:focus { border-color: #caa130; }

    .btn {
      padding: 12px 32px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      font-weight: 600;
    }

    .btn:active { transform: scale(0.97); }

    #start-btn {
      background: #caa130;
      color: #ffffff;
      width: 100%;
    }

    #submit-btn {
      background: #146082;
      color: #ffffff;
      width: 100%;
      display: none;
    }

    #next-btn {
      background: #caa130;
      color: #ffffff;
      width: 100%;
      margin-top: 10px;
      display: none;
    }

    #retry-btn {
      background: #146082;
      color: #ffffff;
      width: 100%;
      margin-top: 10px;
      display: none;
    }

    #feedback {
      margin-top: 16px;
      padding: 14px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      display: none;
    }

    .correct {
      background: #1a4731;
      color: #ffffff;
      border: 1px solid #4ade80;
    }

    .wrong {
      background: #4b1c1c;
      color: #ffffff;
      border: 1px solid #f87171;
    }

    #tip-box {
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: 8px;
      background: #3a2a00;
      border: 1px solid #caa130;
      color: #f0d080;
      font-size: 0.92rem;
      line-height: 1.5;
      text-align: left;
      display: none;
    }

    #tip-box strong {
      display: block;
      margin-bottom: 4px;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #caa130;
    }

  </style>
</head>
<body>
  <div class="card">
    <div style="display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:8px;">
      <img src="tzkt_logo_full.png" alt="TzKT logo" style="height:52px; width:auto;">
      <h1 style="margin-bottom:0;">TzKweez</h1>
    </div>
    <p class="subtitle">TzKT Tezos Explorer</p>

    <div id="question-box">Press "Start" to begin</div>

    <input type="text" id="answer-input" placeholder="Type your answer here..." style="display:none" autocomplete="off">

    <button class="btn" id="start-btn" onclick="startQuiz()">Start</button>
    <button class="btn" id="submit-btn" onclick="checkAnswer()">Submit</button>
    <button class="btn" id="retry-btn" onclick="retryQuestion()">Try Again</button>
    <button class="btn" id="next-btn" onclick="nextQuestion()">Next Question</button>

    <div id="feedback"></div>
    <div id="tip-box">
      <strong>💡 Hint</strong>
      <span id="tip-text"></span>
      <img id="tip-qr" src="" alt="QR code" style="display:none; margin-top:10px; width:180px; height:180px; border-radius:6px; display:none; margin-left:auto; margin-right:auto;">
    </div>
  </div>

  <script>
    const questions = [
      {
        question: "TzKT explorer allows users to explore Tezos governance process. You can observe how many epochs have changed, every upgrade proposal created and current proposal voting status. Question: How many stages has Tezos governance procedure?",
        answer: "5",
        tip: "Navigate to the Governance section on TzKT and look at the voting period cycle diagram.",
        tipQR: "https://tzkt.io/governance/current/proposal"
      },
      {
        question: "TzKT explorer have the Stats section. There you can explore many essential Tezos values displayed in graphs and charts, which allows to visualise the dynamics. Question: State the highest recorded Staking APY",
        answer: "17.52",
        tip: "Go to the Stats section and hover over the peak of the Staking APY graph to read the exact value.",
        tipQR: "https://tzkt.io/stats/staking-apy?type=line&period=month"
      },
      {
        question: "TzKT allows you to review bakery software. You can assess how many bakers use each version of the software and find the links to the software update. Question: State the current software version",
        answer: ["24.2", "v24.2"],
        tip: "Visit the Bakers section, find the Bakery Software tab, and look for the most recent version listed.",
        tipQR: "https://tzkt.io/software"
      },
      {
        question: "TzKT has a specific section where you can explore Tezos dApps and get detailed information, including numbers, graphs, social links and all contracts and tokens related to the project. Question: Find the Sirius dApp and find out the symbol of the token it is using.",
        answer: "SIRS",
        tip: "Go to the dApps section, search for Sirius, and check the token listed under its details.",
        tipQR: "https://tzkt.io/dapps/sirius"
      },
      {
        question: "Double baking event is designed to prevent the ecosystem from the baker mistakes or fraud, encouraging with a reward in case of accusing the issue.\nQuestion: What is the biggest reward for double baking accusation?",
        answer: "64003",
        tip: "Search for double baking events on TzKT and sort by reward to find the highest accusation reward.",
        tipQR: "https://tzkt.io/double_baking"
      },
      {
        question: "What city was the first Tezos protocol upgrade named after? Tip: It was the first protocol upgrade, which was adopted based on a community vote.",
        answer: "Athens",
        tip: "Go to the Protocols section on TzKT and find the first community-voted upgrade.",
        tipQR: "https://tzkt.io/protocols"
      },
      {
        question: "Now one Tezos block is generated every 6 seconds.\nQuestion: How many seconds did it take initially? Tip: The first protocol is Alpha I",
        answer: "60",
        tip: "Navigate to the Protocols section on TzKT and open Alpha I to check its block time parameter.",
        tipQR: "https://tzkt.io/protocols"
      },
      {
        question: "The TzKT API serves 2 billion requests per month.\nQuestion: How many requests a single user can provide per day under the free plan?",
        answer: "500000",
        tip: "Check the TzKT API pricing or documentation page for the free tier limits.",
        tipQR: "https://tzkt.io/api"
      },
      {
        question: "Question: When was Etherlink originated? Enter dd-mm-yyyy",
        answer: "29-04-2024",
        tip: "Open Blockchain → Smart Rollup Operations → Originate.",
        tipQR: "https://tzkt.io/smart_rollup_originate"
      },
      {
        question: "Question: What is the biggest amount not yet activated from ICO?",
        answer: "2500000",
        tip: "Open Commitments in the Blockchain tab and switch to 'Pending'.",
        tipQR: "https://tzkt.io/commitments?pending=true"
      },
      {
        question: "Question: Find out the \"biggest\" domain owned by the owner of sugardaddy.tez.",
        answer: "bigisland.tez",
        tip: "Look up the owner of sugardaddy.tez on TzKT and browse their token balances filtered by 'big'.",
        tipQR: "https://tzkt.io/tz1SDextwQzz7AAL8EkRZoFhFqqrVh2mfjUD/balances/?s=big"
      },
      {
        question: "Question: State the date of the genesis block in Tezos. Enter dd-mm-yyyy",
        answer: "30-06-2018",
        tip: "Search for block #1 on TzKT and check its timestamp.",
        tipQR: "https://tzkt.io/0/info"
      },
    ];

    let current = null;
    let used = [];

    function getRandom() {
      const remaining = questions.filter((_, i) => !used.includes(i));
      if (remaining.length === 0) {
        used = [];
        return questions[Math.floor(Math.random() * questions.length)];
      }
      const idx = questions.indexOf(remaining[Math.floor(Math.random() * remaining.length)]);
      used.push(idx);
      return questions[idx];
    }

    function startQuiz() {
      used = [];
      document.getElementById('start-btn').style.display = 'none';
      showQuestion();
    }

    function showQuestion() {
      current = getRandom();
      const box = document.getElementById('question-box');
      const parts = current.question.split(/(?=Question:)/i);
      if (parts.length === 2) {
        box.innerHTML = `<div><span style="opacity:0.85">${parts[0].trim()}</span><br><br><strong>${parts[1].trim()}</strong></div>`;
      } else {
        box.textContent = current.question;
      }
      const input = document.getElementById('answer-input');
      input.style.display = 'block';
      input.value = '';
      input.focus();
      document.getElementById('submit-btn').style.display = 'block';
      document.getElementById('next-btn').style.display = 'none';
      const fb = document.getElementById('feedback');
      fb.style.display = 'none';
      fb.className = '';
      document.getElementById('tip-box').style.display = 'none';
      document.getElementById('tip-text').textContent = '';
      document.getElementById('tip-qr').style.display = 'none';
      document.getElementById('tip-qr').src = '';
    }

    function checkAnswer() {
      const input = document.getElementById('answer-input');
      const userAnswer = input.value.trim().toLowerCase();
      if (!userAnswer) return;

      const answers = Array.isArray(current.answer) ? current.answer : [current.answer];
      const correct = answers.map(a => a.toLowerCase());
      const fb = document.getElementById('feedback');

      if (correct.includes(userAnswer)) {
        fb.textContent = '✓ Correct!';
        fb.className = 'correct';
        document.getElementById('next-btn').style.display = 'block';
        document.getElementById('retry-btn').style.display = 'none';
      } else {
        fb.textContent = '✗ Wrong. Try again!';
        fb.className = 'wrong';
        document.getElementById('next-btn').style.display = 'block';
        document.getElementById('retry-btn').style.display = 'block';
        if (current.tip) {
          document.getElementById('tip-text').textContent = current.tip;
          const qrImg = document.getElementById('tip-qr');
          if (current.tipQR) {
            qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(current.tipQR)}`;
            qrImg.style.display = 'block';
          } else {
            qrImg.style.display = 'none';
          }
          document.getElementById('tip-box').style.display = 'block';
        }
      }

      fb.style.display = 'block';
      document.getElementById('submit-btn').style.display = 'none';
      input.disabled = true;
    }

    function retryQuestion() {
      const input = document.getElementById('answer-input');
      input.disabled = false;
      input.value = '';
      input.focus();
      document.getElementById('retry-btn').style.display = 'none';
      document.getElementById('submit-btn').style.display = 'block';
      const fb = document.getElementById('feedback');
      fb.style.display = 'none';
      fb.className = '';
      document.getElementById('tip-box').style.display = 'none';
      document.getElementById('tip-qr').style.display = 'none';
      document.getElementById('tip-qr').src = '';
    }

    function nextQuestion() {
      document.getElementById('answer-input').disabled = false;
      document.getElementById('retry-btn').style.display = 'none';
      showQuestion();
    }

    // Allow pressing Enter to submit
    document.getElementById('answer-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        if (document.getElementById('submit-btn').style.display !== 'none') {
          checkAnswer();
        } else {
          nextQuestion();
        }
      }
    });
  </script>
</body>
</html>
